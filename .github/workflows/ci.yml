name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: installer syntax
        run: bash -n setup
      - name: no em dashes in repo prose
        run: bun lib/slop-check.ts
      - name: tests
        run: bun test
